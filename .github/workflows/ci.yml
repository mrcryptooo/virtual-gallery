name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # pnpm version comes from package.json "packageManager" (single source of truth)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: E2E smoke (chromium + webkit)
        run: pnpm e2e

      # Later stages per docs/12 (added by their milestones):
      # M0.4+ → validate-packages (content gates, ADR-010)
      # M1.7  → perf budgets + Playwright perf spec (doc 08 §5)
